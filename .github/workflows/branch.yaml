name: CI (Branch)

on:
  push:
    branches-ignore:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GAR_REGION: ${{ vars.GAR_REGION }}
  GAR_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GAR_REPO: ${{ vars.GAR_REPO }}
  GAR_IMAGE: piratex

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yaml

  docker:
    name: Docker Build & Push
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Docker login to GAR
        run: gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin "https://${{ env.GAR_REGION }}-docker.pkg.dev"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.GAR_REGION }}-docker.pkg.dev/${{ env.GAR_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.GAR_IMAGE }}:${{ github.sha }}
