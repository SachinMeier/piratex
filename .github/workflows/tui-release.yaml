name: TUI Release

on:
  push:
    tags: ["tui-v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            target: bun-darwin-arm64
            asset: piratex-darwin-arm64.tar.gz
            runs_on: macos-latest
          - name: darwin-x64
            target: bun-darwin-x64
            asset: piratex-darwin-x64.tar.gz
            runs_on: macos-latest
          - name: linux-x64
            target: bun-linux-x64
            asset: piratex-linux-x64.tar.gz
            runs_on: ubuntu-latest
          - name: linux-arm64
            target: bun-linux-arm64
            asset: piratex-linux-arm64.tar.gz
            runs_on: ubuntu-latest
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: cd clients/tui && bun install --frozen-lockfile

      - name: Typecheck
        run: cd clients/tui && bun x tsc --noEmit

      - name: Test
        run: cd clients/tui && bun vitest run

      - name: Build
        run: |
          cd clients/tui
          bun build --compile \
            --target=${{ matrix.target }} \
            src/index.tsx \
            --outfile piratex

      - name: Sign (macOS only)
        if: startsWith(matrix.target, 'bun-darwin')
        run: |
          cd clients/tui
          codesign --remove-signature piratex 2>/dev/null || true
          codesign -s - --force piratex

      - name: Package
        run: |
          cd clients/tui
          tar -czf ../../${{ matrix.asset }} piratex

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          generate_release_notes: true
          fail_on_unmatched_files: true
